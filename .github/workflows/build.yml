name: Build Android eBPF Binary

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 1. 安装稳定版工具链 (用于编译 Android 用户态)
      - name: Install Stable Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      # 2. 手动安装 Nightly 工具链及 rust-src (专用于编译 eBPF)
      - name: Install Nightly Toolchain for eBPF
        run: rustup toolchain install nightly --component rust-src

      - name: Install Cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      # 3. 使用 nightly 编译 eBPF (必须加 -Z build-std=core)
      - name: Build eBPF Kernel Program
        env:
          # 核心技巧：通过环境变量临时给 eBPF 编译关闭 LTO，防止 bpf-linker 报错
          CARGO_PROFILE_RELEASE_LTO: "false"
        run: cargo +nightly build --target bpfel-unknown-none -Z build-std=core -p mem_cleaner-ebpf --release

      - name: Verify eBPF Artifact
        run: ls -la target/bpfel-unknown-none/release/mem_cleaner-ebpf

      # 4. 使用 stable 和 cross 编译 Android 主程序
      - name: Build User-space Daemon for Android (aarch64)
        env:
          CROSS_NO_WARNINGS: 0
          # 这里不覆盖 LTO，让它默认使用 Cargo.toml 里的 lto="fat" 极致压缩
        run: cross +stable build --target aarch64-linux-android -p mem_cleaner --release

      - name: Rename and Package Binary
        run: |
          mkdir -p output
          cp target/aarch64-linux-android/release/mem_cleaner output/mem_cleaner

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mem_cleaner_ebpf_arm64
          path: output/mem_cleaner